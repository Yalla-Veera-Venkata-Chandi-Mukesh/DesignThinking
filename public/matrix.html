    <style>
        :root {
            --bg-color: transparent;
            --card-bg: #16161f;
            --accent-primary: #c8ff00;
            --accent-secondary: #e2ff4c;
            --text-primary: #f8fafc;
            --text-secondary: #8a8a9a;
            --glass-border: #252533;
            --quick-win: #10b981;
            --major-project: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: none;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            line-height: 1.5;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { margin-bottom: 3rem; text-align: center; }
        h1 {
            font-size: 3rem; font-weight: 800;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle { color: var(--text-secondary); font-size: 1.1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); padding: 1.5rem; border-radius: 1rem; text-align: center; transition: transform 0.3s ease; }
        .stat-value { font-size: 2.5rem; font-weight: 800; display: block; margin-bottom: 0.25rem; }
        .stat-label { color: var(--text-secondary); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 3rem; }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 1.5rem; padding: 0; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .card-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
        #matrix-container { height: 500px; position: relative; background: rgba(0,0,0,0.2); border-radius: 1rem; overflow: hidden; }
        .table-container { overflow-x: auto; max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #1a1a24; padding: 1rem; color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; position: sticky; top: 0; z-index: 10; }
        td { padding: 1rem; border-bottom: 1px solid var(--glass-border); font-size: 0.95rem; }
        tr:hover { background: rgba(255, 255, 255, 0.05); }
        .badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; display: inline-block; }
        .badge-short { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-medium { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .badge-high { background: rgba(56, 189, 248, 0.2); color: #38bdf8; }
        .search-box { background: #1a1a24; border: 1px solid var(--glass-border); color: white; padding: 0.75rem 1rem; border-radius: 0.75rem; width: 100%; margin-bottom: 1rem; font-family: inherit; }
        .quadrant-label { position: absolute; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: rgba(255,255,255,0.2); letter-spacing: 2px; pointer-events: none; }
    </style>
</head>

        function init() {
            updateStats();
            renderMatrix();
            renderTable(allData);
            document.getElementById('search').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allData.filter(d => d.idea.toLowerCase().includes(term) || d.category.toLowerCase().includes(term));
                renderTable(filtered);
            });
        }

        function updateStats() {
            document.getElementById('total-ideas').innerText = allData.length;
            document.getElementById('quick-wins').innerText = allData.filter(d => d.time.includes('Short')).length;
            document.getElementById('major-efforts').innerText = allData.filter(d => d.time.includes('Medium')).length;
            document.getElementById('high-viability').innerText = allData.filter(d => d.viability === 'High').length;
        }

        function renderMatrix() {
            const ctx = document.getElementById('matrixChart').getContext('2d');
            const scatterData = allData.map(d => ({
                x: d.effort + (Math.random() - 0.5) * 0.8,
                y: d.value + (Math.random() - 0.5) * 0.8,
                label: d.idea
            }));
            new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        data: scatterData,
                        backgroundColor: (c) => c.raw && c.raw.x < 3.5 ? 'rgba(16, 185, 129, 0.6)' : 'rgba(245, 158, 11, 0.6)',
                        pointRadius: 5, borderWidth: 1, borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { min: 0, max: 7, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false }, title: { display: true, text: 'Effort', color: '#8a8a9a'} },
                        y: { min: 0, max: 10, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { display: false }, title: { display: true, text: 'Value', color: '#8a8a9a'} }
                    },
                    plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => c.raw.label } } }
                }
            });
        }

        function renderTable(data) {
            document.getElementById('table-body').innerHTML = data.map(d => `
                <tr>
                    <td>${d.idea}</td>
                    <td style="color: var(--text-secondary); font-size: 0.8rem;">${d.category}</td>
                    <td><span class="badge badge-${d.time.includes('Short') ? 'short' : 'medium'}">${d.time.split(' ')[0]}</span></td>
                    <td><span class="badge badge-high">${d.viability}</span></td>
                </tr>
            `).join('');
        }
        init();
    </script>
